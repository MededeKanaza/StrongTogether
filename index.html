<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strong Together | Home</title>

<style>
/* ===== GLOBAL STYLES ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f0fdf4;
    color: #14532d;
}

/* ===== WRAPPER ===== */
.wrapper {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

/* ===== HEADER / NAVIGATION ===== */
.site-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 3px solid #22c55e;
    padding: 15px 0;
    background: transparent;
}

.brand {
    font-size: 28px;
    font-weight: bold;
}

.brand span {
    color: #22c55e;
}

.main-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    list-style: none;
    padding: 0;
    margin: 0;
}

.main-nav li {
    list-style: none;
}

.main-nav a {
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 25px;
    color: #166534;
    font-weight: bold;
    display: inline-block;
    transition: all 0.3s ease;
}

.main-nav a:hover {
    background: #22c55e;
    color: white;
}

.main-nav a.active {
    background: #22c55e;
    color: white;
}

/* ===== SLIDER ===== */
.slider {
    position: relative;
    overflow: hidden;
    border-radius: 15px;
    margin-top: 20px;
}

.slides {
    display: flex;
    transition: 0.5s;
}

.slide {
    min-width: 100%;
}

.slide img {
    width: 100%;
    height: 420px;
    object-fit: cover;
}

.btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    border: none;
    padding: 12px 16px;
    cursor: pointer;
    border-radius: 50%;
    color: white;
    font-size: 18px;
    transition: 0.3s;
}

.btn:hover {
    background: #22c55e;
}

.prev {
    left: 10px;
}

.next {
    right: 10px;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    padding: 15px;
    margin-top: 30px;
    background: #14532d;
    color: white;
    font-weight: bold;
    border-top: 3px solid #22c55e;
}

/* ===== TYPOGRAPHY ===== */
h1 {
    margin: 25px 0;
    color: #0f7a3a;
}
</style>
</head>

<body>

<div class="wrapper">

<header class="site-header">
    <div class="brand">Strong <span>Together</span></div>
    <ul class="main-nav">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="aboutus.html">About Us</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="feedback.html">Feedback</a></li>
       <li><a href="paycheck.html">Salary Calculator</a></li>
		<li><a href="mortgage.html">Mortgage Calculator</a></li>
    </ul>
</header>

<h1>Welcome to Strong Together</h1>

<div class="slider">
    <div class="slides" id="slides">
        <div class="slide"><img src="image/WhatsApp Image 2026-04-07 at 9.22.32 AM (13).jpeg" alt="Slide 1"></div>
        <div class="slide"><img src="image/WhatsApp Image 2026-04-08 at 11.00.12 AM (1).jpeg" alt="Slide 2"></div>
        <div class="slide"><img src="image/WhatsApp Image 2026-04-08 at 11.00.12 AM (2).jpeg" alt="Slide 3"></div>
        <div class="slide"><img src="image/WhatsApp Image 2026-04-07 at 9.22.31 AM.jpeg" alt="Slide 4"></div>
    </div>
    <button class="btn prev" onclick="prev()">❮</button>
    <button class="btn next" onclick="next()">❯</button>
</div>

</div>

<footer class="footer">
    Strong Together - Designed by Medede Kanaza.
</footer>

<script>
let slideIndex = 0;
const totalSlides = 4;

function showSlides() {
    document.getElementById("slides").style.transform = `translateX(-${slideIndex * 100}%)`;
}

function nextSlide() {
    slideIndex = (slideIndex + 1) % totalSlides;
    showSlides();
}

function prevSlide() {
    slideIndex = (slideIndex - 1 + totalSlides) % totalSlides;
    showSlides();
}

setInterval(nextSlide, 4000);
</script>

</body>
</html>
