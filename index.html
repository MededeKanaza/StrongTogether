<style>
body{

.container{max-width:1200px;margin:auto;padding:20px;}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
border-bottom:3px solid #22c55e;
padding:15px 0;
}

.brand{font-size:28px;font-weight:bold;}
.brand span{color:#22c55e;}

.nav-links{
display:flex;
flex-wrap:wrap;
gap:10px;
list-style:none;
padding:0;

}

.nav-links a{

padding:10px 15px;

}

.nav-links a:hover,
.nav-links .active{

}

.slider{

overflow:hidden;
border-radius:15px;
margin-top:20px;
}

.slides{display:flex;transition:0.5s;}
.slide{min-width:100%;}
.slide img{width:100%;height:420px;object-fit:cover;}

.btn{
position:absolute;
top:50%;
transform:translateY(-50%);
border:none;
padding:10px;
cursor:pointer;
border-radius:50%;
}

.prev{left:10px;}
.next{right:10px;}

.footer{text-align:center;margin-top:20px;}
</style>
</head>

<button class="btn prev" onclick="prev()">❮</button>
<button class="btn next" onclick="next()">❯</button>
</div>

</div>

<script>
let i=0;
const total=4;

function show(){
document.getElementById("slides").style.transform=`translateX(-${i*100}%)`;
}

function next(){i=(i+1)%total;show();}
function prev(){i=(i-1+total)%total;show();}
setInterval(next,4000);
</script>
