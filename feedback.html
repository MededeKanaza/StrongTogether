<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback | Strong Together</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f0fdf4;
color:#14532d;
}

/* WRAPPER */
.wrapper{
max-width:1200px;
margin:auto;
padding:20px;
}

/* HEADER / NAV */
.site-header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
border-bottom:3px solid #22c55e;
padding:15px 0;
}

.brand{
font-size:28px;
font-weight:bold;
}

.brand span{
color:#22c55e;
}

.main-nav{
display:flex;
flex-wrap:wrap;
gap:10px;
list-style:none;
padding:0;
margin:0;
}

.main-nav a{
text-decoration:none;
padding:10px 18px;
border-radius:30px;
color:#166534;
font-weight:bold;
display:inline-block;
transition:0.3s;
}

.main-nav a:hover,
.main-nav a.active{
background:#22c55e;
color:white;
}

/* TITLE */
h1{
margin-top:25px;
color:#0f7a3a;
}

/* FEEDBACK BOX */
.feedback-box{
background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
border-left:6px solid #22c55e;
}

.feedback-box p{
font-style:italic;
}

/* FOOTER */
.footer{
text-align:center;
padding:15px;
margin-top:30px;
background:#14532d;
color:white;
font-weight:bold;
border-top:3px solid #22c55e;
}
</style>
</head>

<body>

<div class="wrapper">

<!-- HEADER -->
<header class="site-header">
<div class="brand">Strong <span>Together</span></div>

<ul class="main-nav">
<li><a href="index.html">Home</a></li>
<li><a href="aboutus.html">About Us</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a class="active" href="feedback.html">Feedback</a></li>
</ul>
</header>

<!-- CONTENT -->
<h1>Feedback</h1>

<div class="feedback-box">
<p>"Strong Together helped me get treatment."</p>
</div>

</div>

<!-- FOOTER -->
<footer class="footer">
Strong Together - Designed by Medede Kanaza.
</footer>

</body>
</html>
