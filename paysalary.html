<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Calculator | Strong Together</title>

<style>
/* ===== GLOBAL STYLES ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f0fdf4;
    color: #14532d;
}

/* ===== WRAPPER ===== */
.wrapper {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

/* ===== HEADER / NAVIGATION ===== */
.site-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 3px solid #22c55e;
    padding: 15px 0;
    background: transparent;
}

.brand {
    font-size: 28px;
    font-weight: bold;
}

.brand span {
    color: #22c55e;
}

.main-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    list-style: none;
    padding: 0;
    margin: 0;
}

.main-nav li {
    list-style: none;
}

.main-nav a {
    text-decoration: none;
    padding: 10px 15px;
    border-radius: 25px;
    color: #166534;
    font-weight: bold;
    display: inline-block;
    transition: all 0.3s ease;
}

.main-nav a:hover {
    background: #22c55e;
    color: white;
}

.main-nav a.active {
    background: #22c55e;
    color: white;
}

/* ===== CALCULATOR STYLES ===== */
.calculator-container {
    max-width: 550px;
    margin: 40px auto;
    background: white;
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1 {
    color: #15803d;
    text-align: center;
    margin-bottom: 25px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-weight: bold;
    color: #14532d;
}

input[type="number"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 2px solid #dcfce7;
    border-radius: 10px;
    font-size: 16px;
    transition: 0.3s;
}

input[type="number"]:focus {
    outline: none;
    border-color: #22c55e;
}

input[type="submit"] {
    background: #22c55e;
    color: white;
    padding: 14px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    width: 100%;
    transition: 0.3s;
}

input[type="submit"]:hover {
    background: #16a34a;
}

.note {
    font-size: 12px;
    color: #666;
    margin-top: 20px;
    text-align: center;
}

/* ===== FOOTER ===== */
.footer {
    text-align: center;
    padding: 15px;
    margin-top: 30px;
    background: #14532d;
    color: white;
    font-weight: bold;
    border-top: 3px solid #22c55e;
}
</style>
</head>

<body>

<div class="wrapper">

<header class="site-header">
    <div class="brand">Strong <span>Together</span></div>
    <ul class="main-nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="aboutus.html">About Us</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="signup.html">Sign Up</a></li>
        <li><a href="phploops.html">PHP Loops</a></li>
        <li><a href="randomvalues.php">Random Values</a></li>
        <li><a href="styled-invoice.html">Invoice</a></li>
        <li><a href="salary-calculator.html" class="active">Salary Calc</a></li>
    </ul>
</header>

<div class="calculator-container">
    <h1>Paycheck Calculator</h1>
    <form action="paycheck.php" method="POST">
        <label for="hours">Hours Worked:</label>
        <input type="number" id="hours" name="hours" step="0.5" min="0" required placeholder="Enter hours worked">

        <label for="rate">Rate of Pay ($ per hour):</label>
        <input type="number" id="rate" name="rate" step="0.01" min="0" required placeholder="Enter hourly rate">

        <input type="submit" value="Calculate Salary">
    </form>
    <div class="note">
        <small>Enter hours worked and hourly rate to calculate gross salary.</small>
    </div>
</div>

</div>

<footer class="footer">
    Strong Together - Designed by Medede Kanaza.
</footer>

</body>
</html>
