<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strong Together - Employee Salary Calculator</title>
    <style>
        /* ===== GLOBAL STYLES (Matching Strong Together) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f0fdf4;
            color: #14532d;
        }

        /* ===== WRAPPER ===== */
        .wrapper {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        /* ===== HEADER / NAVIGATION (Matching Strong Together) ===== */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 3px solid #22c55e;
            padding: 15px 0;
            background: transparent;
        }

        .brand {
            font-size: 28px;
            font-weight: bold;
        }

        .brand span {
            color: #22c55e;
        }

        .main-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .main-nav li {
            list-style: none;
        }

        .main-nav a {
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 25px;
            color: #166534;
            font-weight: bold;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .main-nav a:hover {
            background: #22c55e;
            color: white;
        }

        .main-nav a.active {
            background: #22c55e;
            color: white;
        }

        /* ===== PAGE CONTENT ===== */
        .page {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .section-title {
            text-align: center;
            margin-bottom: 30px;
            color: #14532d;
            font-size: 2rem;
        }

        .section-title span {
            border-bottom: 3px solid #22c55e;
            padding-bottom: 5px;
        }

        .calc-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 1px solid #bbf7d0;
        }

        .calc-container h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #166534;
        }

        .form-group-calc {
            margin-bottom: 20px;
        }

        .form-group-calc label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #14532d;
        }

        .form-group-calc input {
            width: 100%;
            padding: 12px;
            border: 2px solid #bbf7d0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group-calc input:focus {
            outline: none;
            border-color: #22c55e;
        }

        .calc-button {
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .calc-button:hover {
            background: #16a34a;
        }

        /* ===== FOOTER (Matching Strong Together) ===== */
        .footer {
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            background: #14532d;
            color: white;
            font-weight: bold;
            border-top: 3px solid #22c55e;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- HEADER / NAVIGATION - Matching Strong Together -->
    <header class="site-header">
        <div class="brand">Strong <span>Together</span></div>
        <ul class="main-nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="aboutus.html">About Us</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="feedback.html">Feedback</a></li>
            <li><a href="paycheck.html" class="active">Salary Calculator</a></li>
            <li><a href="mortgage.html">Mortgage Calculator</a></li>    
        </ul>
    </header>

    <!-- MAIN CONTENT -->
<div class="page">
        <h1 class="section-title"><span>Paycheck</span></h1>
        
        <div class="calc-container">
            <h2>Salary Calculator</h2>
            <form action="paycheck.php" method="POST">
                <div class="form-group-calc">
                    <label for="hours">Hours Worked:</label>
                    <input type="number" id="hours" name="hours" step="0.1" required placeholder>
                </div>

                <div class="form-group-calc">
                    <label for="rate">Hourly Rate ($):</label>
                    <input type="number" id="rate" name="rate" step="0.01" required placeholder>
                </div>

                <button type="submit" class="calc-button">Calculate Paycheck</button>
            </form>
        </div>
    </div>

    <!-- FOOTER - Matching Strong Together -->
    <footer class="footer">
        Strong Together - Designed by Medede Kanaza.
    </footer>
</div>

</body>
</html>
