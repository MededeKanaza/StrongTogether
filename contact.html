<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(#dff7e8, #eafff2);
    color:#14532d;
}

/* PAGE WRAPPER */
.wrapper{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

/* NAVBAR */
.site-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    border-bottom:2px solid #22c55e;
    padding:15px 0;
}

.brand{
    font-size:28px;
    font-weight:bold;
}

.brand span{
    color:#22c55e;
}

/* NAV LINKS */
.main-nav{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    list-style:none;
    padding:0;
    margin:0;
}

.main-nav a{
    text-decoration:none;
    padding:10px 18px;
    border-radius:30px;
    color:#166534;
    font-weight:bold;
}

.main-nav a:hover,
.main-nav a.active{
    background:#22c55e;
    color:#fff;
}

/* CONTACT CARD */
.contact-card{
    background:#ffffff;
    border-radius:25px;
    padding:40px;
    margin-top:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* TITLE */
.contact-title{
    font-size:38px;
    font-weight:bold;
    color:#15803d;
    margin-bottom:25px;
}

/* INFO BOXES */
.info-box{
    background:#ecfdf5;
    border-left:6px solid #22c55e;
    padding:18px 20px;
    border-radius:12px;
    margin-bottom:15px;
    font-size:16px;
}

/* FOOTER */
.footer{
    text-align:center;
    margin-top:40px;
    padding-top:20px;
    border-top:1px solid #b7f7cc;
    font-size:14px;
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- NAVIGATION -->
    <header class="site-header">
        <div class="brand">Strong <span>Together</span></div>

        <ul class="main-nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="aboutus.html">About Us</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a class="active" href="contact.html">Contact</a></li>
            <li><a href="feedback.html">Feedback</a></li>
        </ul>
    </header>

    <!-- CONTACT SECTION -->
    <div class="contact-card">

        <div class="contact-title">Contact Us</div>

        <div class="info-box">
            <strong>Email:</strong> hello@strongtogether.com
        </div>

        <div class="info-box">
            <strong>Phone:</strong> +1 800 674 2390
        </div>

        <div class="footer">
          Strong Together - Designed by Medede Kanaza. 
        </div>

    </div>

</div>

</body>
</html>
