<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Strong Together</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(#dff7e8, #eafff2);
    color:#14532d;
}

/* PAGE WRAPPER */
.wrapper{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

/* NAVBAR */
.site-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    border-bottom:2px solid #22c55e;
    padding:15px 0;
}

.brand{
    font-size:28px;
    font-weight:bold;
}

.brand span{
    color:#22c55e;
}

/* NAV LINKS */
.main-nav{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    list-style:none;
    padding:0;
    margin:0;
}

.main-nav li{
    list-style:none;
}

.main-nav a{
    text-decoration:none;
    padding:10px 15px;
    border-radius:25px;
    color:#166534;
    font-weight:bold;
    display:inline-block;
    transition:0.3s;
}

.main-nav a:hover,
.main-nav a.active{
    background:#22c55e;
    color:#fff;
}

/* CONTACT CARD */
.contact-card{
    background:#ffffff;
    border-radius:25px;
    padding:40px;
    margin-top:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

/* TITLE */
.contact-title{
    font-size:38px;
    font-weight:bold;
    color:#15803d;
    margin-bottom:25px;
}

/* INFO BOXES */
.info-box{
    background:#ecfdf5;
    border-left:6px solid #22c55e;
    padding:18px 20px;
    border-radius:12px;
    margin-bottom:15px;
    font-size:16px;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:15px;
    margin-top:30px;
    background:#14532d;
    color:white;
    font-weight:bold;
    border-top:3px solid #22c55e;
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- NAVIGATION -->
    <header class="site-header">
        <div class="brand">Strong <span>Together</span></div>

        <ul class="main-nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="aboutus.html">About Us</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a class="active" href="contact.html">Contact</a></li>
            <li><a href="feedback.html">Feedback</a></li>

            <li><a href="https://mededekanaza.github.io/phploops/" target="_blank">PHP Loops</a></li>
            <li><a href="http://randomvalues.atwebpages.com" target="_blank">randomValues.php</a></li>
            <li><a href="https://mededekanaza.github.io/styled-invoice-page/" target="_blank">style-invoice</a></li>
            <li><a href="http://paysalary.atwebpages.com" target="_blank">Salary Calculator</a></li>
			<li><a href="http://ambianceuseaccreate.atwebpages.com" target="_blank">Sign_up</a></li>
        </ul>
    </header>

    <!-- CONTACT SECTION -->
    <div class="contact-card">

        <div class="contact-title">Contact Us</div>

        <div class="info-box">
            <strong>Email:</strong> contact@strongtogether.org
        </div>

        <div class="info-box">
            <strong>Phone:</strong> +1 (000)-000-0000
        </div>

    </div>

</div>

<!-- FOOTER -->
<footer class="footer">
    Strong Together - Designed by Medede Kanaza.
</footer>

</body>
</html>
